<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login_teacher.css') }}">
</head>
<body>

    <div class="login-card">
        <a href="/" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back</a>
        
        <div class="avatar-zone">
            <i class="fa-solid fa-chalkboard-user"></i>
        </div>
        
        <h2>Teacher Portal</h2>
        <p class="subtitle">Sign in to manage your classes</p>

        <form action="/login/teacher" method="POST" id="teacherLoginForm">
            <div class="input-group">
                <i class="fa-solid fa-phone input-icon"></i>
                <input type="tel" name="username_or_phone" placeholder="Phone Number" required autocomplete="off">
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock input-icon"></i>
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <div class="switch-zone">
            Don't have an account? <a href="/signup/teacher">Register Here</a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/login_teacher.js') }}"></script>
</body>
</html>
