<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Registration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- টিচারদের সব পেজে একই থিম থাকবে তাই একই CSS ব্যবহার করছি -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login_teacher.css') }}">
</head>
<body>

    <div class="login-card">
        <a href="/login/teacher" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back</a>
        
        <div class="avatar-zone">
            <i class="fa-solid fa-user-plus"></i>
        </div>
        
        <h2>Teacher Register</h2>
        <p class="subtitle">Create your account with basic details</p>

        <form action="/signup/teacher" method="POST" id="teacherSignupForm">
            <!-- শুধুমাত্র নাম, ফোন নম্বর ও পাসওয়ার্ড -->
            <div class="input-group">
                <i class="fa-solid fa-user input-icon"></i>
                <input type="text" name="name" placeholder="Full Name" required autocomplete="off">
            </div>

            <div class="input-group">
                <i class="fa-solid fa-phone input-icon"></i>
                <input type="tel" name="phone" placeholder="Phone Number" required autocomplete="off">
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock input-icon"></i>
                <input type="password" name="password" placeholder="Create Password" required>
            </div>

            <button type="submit" class="login-btn register-btn">Sign Up</button>
        </form>

        <div class="switch-zone">
            Already have an account? <a href="/login/teacher">Sign In Instead</a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/signup_teacher.js') }}"></script>
</body>
</html>
