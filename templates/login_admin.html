<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login_admin.css') }}">
</head>
<body>

    <div class="login-card">
        <div class="back-btn" onclick="goBack()">
            <i class="fa-solid fa-arrow-left"></i> Back
        </div>
        
        <div class="avatar-zone">
            <i class="fa-solid fa-user-shield"></i>
        </div>
        
        <h2>Admin Portal</h2>
        <p class="subtitle">Enter your credentials to access control unit</p>

        <!-- কোনো ভুল ইউজারনেম/পাসওয়ার্ড দিলে Flask থেকে এই এররটা দেখাবে -->
        {% if error %}
        <div class="error-msg">
            <i class="fa-solid fa-triangle-exclamation"></i> {{ error }}
        </div>
        {% endif %}

        <form action="/login/admin" method="POST" id="adminLoginForm">
            <div class="input-group">
                <i class="fa-solid fa-user input-icon"></i>
                <input type="text" name="username_or_phone" placeholder="Admin Username" required autocomplete="off">
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock input-icon"></i>
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <button type="submit" class="login-btn">
                Sign In <i class="fa-solid fa-right-to-bracket"></i>
            </button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='js/login_admin.js') }}"></script>
</body>
</html>
